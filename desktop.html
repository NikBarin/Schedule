<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>РАСПИСАШКА 📅</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="fawicon.ico">
    <style>
        :root {
            --bg1: #050b18;
            --bg2: #0b1426;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
            --accent: #67c8ff;
            --accent-2: #d685ff;
            --text: #eef5ff;
            --muted: #9fb3d1;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(600px 400px at 10% 15%, rgba(103, 200, 255, 0.1), transparent),
                      radial-gradient(600px 400px at 90% 85%, rgba(214, 133, 255, 0.07), transparent),
                      linear-gradient(180deg, var(--bg1), var(--bg2));
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 20px 0;
            max-width: 1200px;
            width: 100%;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 16px;
        }

        .day-selector {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 16px 0;
            margin-bottom: 24px;
            flex-wrap: nowrap;
            overflow-x: auto;
            width: 100%;
            max-width: 1200px;
        }

        .day-selector button {
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .day-selector button.active {
            background: linear-gradient(90deg, rgba(103, 200, 255, 0.3), rgba(214, 133, 255, 0.3));
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .schedule {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
        }

        .lesson-card {
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 20px 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .lesson-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .lesson-time {
            color: var(--muted);
            font-weight: 600;
            font-size: 15px;
        }

        .lesson-name {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.3;
        }

        .lesson-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 15px;
            color: var(--muted);
        }

        .lesson-hw {
            font-size: 15px;
            margin-top: 8px;
            color: var(--accent);
            line-height: 1.4;
        }

        .lesson-img {
            margin-top: 12px;
            border-radius: 14px;
            max-width: 100%;
            max-height: 200px;
            object-fit: cover;
            cursor: zoom-in;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .lesson-img:hover {
            border-color: var(--accent);
        }

        /* Модальное окно */
        #imgModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 40px;
            animation: fadeIn 0.3s ease;
        }

        #imgModal img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        #imgModal img:hover {
            transform: scale(1.02);
        }

        #imgModalClose {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        #imgModalClose:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        footer {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-top: 40px;
            padding: 20px 0;
            opacity: 0.7;
            width: 100%;
            max-width: 1200px;
        }

        /* Анимация появления модального окна */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Адаптация для очень широких экранов */
@media (min-width: 1400px) {
    body {
        padding: 40px;
    }
    .day-selector, .schedule, footer {
        max-width: 1400px;
    }
}
</style>
</head>
<body>
    <header>
        <div class="title">РАСПИСАШКА</div>
        <div class="subtitle">Информация может быть неточной</div>
    </header>

    <div class="day-selector" id="daySelector">
        <button class="active" data-day="Понедельник">Пн</button>
        <button data-day="Вторник">Вт</button>
        <button data-day="Среда">Ср</button>
        <button data-day="Четверг">Чт</button>
        <button data-day="Пятница">Пт</button>
    </div>

    <div class="schedule" id="scheduleList"></div>

    <footer>Сделано с помощью ChatGPT</footer>

    <!-- Модальное окно для изображений -->
    <div id="imgModal">
        <div id="imgModalClose">✕</div>
        <img id="imgModalContent" src="" alt="Увеличенное изображение">
    </div>

    <script>
        const times = [
            '12:40–13:20', '13:40–14:20', '14:40–15:20',
            '15:40–16:20', '16:30–17:10', '17:20–18:00', '18:10–18:50'
        ];

        /* Ваше расписание с примерами изображений */
        const data = {
  'Понедельник': [
    { lesson: 'Алгебра', room: '46', teacher: 'Екатерина Сергеевна', hw: '', img: '' },
    { lesson: 'Труд', room: '9', teacher: 'Елена Викторовна', hw: '', img: '' },
    { lesson: 'Труд', room: '9', teacher: 'Елена Викторовна', hw: '', img: '' },
    { lesson: 'Англ/Инф', room: '49a/39', teacher: 'Марина Владиславовна/Иван Анатольевич', hw: '', img: '' },
    { lesson: 'Русский', room: '33', teacher: 'Алёна Сергеевна', hw: '', img: '' },
    { lesson: 'Литература', room: '33', teacher: 'Алёна Сергеевна', hw: '', img: '' },
    { lesson: 'Физика', room: '46', teacher: 'Иван Анатольевич', hw: '', img: '' }
  ],
  'Вторник': [
    { lesson: 'Физ-ра', room: 'Большой зал', teacher: 'Сергей Александрович', hw: '', img: '' },
    { lesson: 'Геометрия', room: '47', teacher: 'Екатерина Сергеевна', hw: 'Выполнить задание из файла', img: 'geom.jpg' },
    { lesson: 'Английский', room: '49а/30', teacher: 'Марина Владиславовна/Оксана Евгеньевна', hw: '', img: '' },
    { lesson: 'География', room: '49', teacher: 'Виктория Владимировна', hw: '', img: '' },
    { lesson: 'Физра', room: 'Большой зал', teacher: 'Сергей Александрович', hw: '', img: '' },
    { lesson: 'Музыка', room: '23', teacher: 'Дарья Андреевна', hw: 'Прочитать стр. 104-105 учеббника', img: '' }
  ],
  'Среда': [
    { lesson: 'Информатика/английский', room: '39/30', teacher: 'Юлия Сергеевна/Оксана Евгеньевна', hw: '', img: '' },
    { lesson: 'Русский', room: '33', teacher: 'Алёна Сергеевна', hw: 'стр 37-38 правило, упр 436', img: '' },
    { lesson: 'Физ-ра', room: 'Большой зал', teacher: 'Сергей Александрович', hw: '', img: '' },
    { lesson: 'Литература', room: '33', teacher: 'Алёна Сергеевна', hw: 'Выучить стихотворение Домики старой Москвы" стр.74', img: '' },
    { lesson: 'Биология', room: '14', teacher: 'Елена Анатольевна', hw: '', img: '' },
    { lesson: 'Алгебра', room: '47', teacher: 'Екатерина Сергеевна', hw: 'Выполнить задание из файла', img: 'alg.jpg' },
    { lesson: 'История', room: '42', teacher: 'Павел Сергеевич', hw: '', img: '' }
  ],
  'Четверг': [
    { lesson: 'Кл. час', room: '29', teacher: 'Виктор Викторович', hw: '', img: '' },
    { lesson: 'Русский', room: '33', teacher: 'Алёна Сергеевна', hw: 'стр 37-38 правило, упр 437', img: '' },
    { lesson: 'Алгебра', room: '46', teacher: 'Екатерина Сергеевна', hw: '', img: '' },
    { lesson: 'Геометрия', room: '47', teacher: 'Екатерина Сергеевна', hw: '', img: '' },
    { lesson: 'Изо', room: '21', teacher: 'Вера Михайловна', hw: '', img: '' },
    { lesson: 'Вероятность и статистика', room: '46', teacher: 'Екатерина Сергеевна', hw: 'Выучить стизотворение "Домики старой Москва" стр. 74', img: 'verka.jpg' },
    { lesson: 'География', room: '49', teacher: 'Виктория Владимировна', hw: '', img: '' }
  ],
  'Пятница': [
    { lesson: 'нет', room: '29', teacher: 'Иван Анатольевич', hw: '', img: '' },
    { lesson: 'Английский', room: '30/49а', teacher: 'Оксана Евгеньевна/Марина Владиславовна', hw: 'cnh 64 №2', img: '' },
    { lesson: 'Русский', room: '33', teacher: 'Алёна Сергеевна', hw: 'упр 442', img: '' },
    { lesson: 'Физкультура', room: 'Большой зал', teacher: 'Сергей Александрович', hw: '', img: '' },
    { lesson: 'нет', room: '42', teacher: 'Павел Сергеевич', hw: '', img: '' },
    { lesson: 'нет', room: '22', teacher: 'Марина Ивановна', hw: '', img: '' }
  ]
};
        const list = document.getElementById('scheduleList');
        const dayButtons = document.querySelectorAll('#daySelector button');

        function renderDay(day) {
            // Активируем нужную кнопку
            dayButtons.forEach(b => b.classList.toggle('active', b.dataset.day === day));

            // Очищаем список уроков
            list.innerHTML = '';

            // Заполняем расписание для выбранного дня
            data[day].forEach((row, i) => {
                const card = document.createElement('div');
                card.className = 'lesson-card';

                card.innerHTML = `
                    <div class="lesson-time">${times[i]}</div>
                    <div class="lesson-name">${row.lesson}</div>
                    <div class="lesson-info">
                        <span>Каб. ${row.room}</span>
                        <span>${row.teacher}</span>
                    </div>
                    ${row.hw ? `<div class="lesson-hw">ДЗ: ${row.hw}</div>` : ''}
                    ${row.img ? `<img src="${row.img}" class="lesson-img" alt="Иллюстрация к уроку">` : ''}
                `;

                list.appendChild(card);
            });

            // Добавляем обработчики для изображений
            document.querySelectorAll('.lesson-img').forEach(img => {
                img.onclick = () => openModal(img.src);
            });
        }

        // Элементы модального окна
        const modal = document.getElementById("imgModal");
        const modalImg = document.getElementById("imgModalContent");
        const modalClose = document.getElementById("imgModalClose");

        // Открытие модального окна с изображением
        function openModal(src) {
            modalImg.src = src;
            modal.style.display = "flex";
        }

        // Закрытие модального окна по клику на крестик или фон
        modalClose.onclick = () => modal.style.display = "none";
        modal.onclick = (e) => {
            if (e.target === modal) modal.style.display = "none";
        };

        // Обработчики для кнопок дней недели
        dayButtons.forEach(btn => {
            btn.addEventListener('click', () => renderDay(btn.dataset.day));
        });

        // Инициализация: показываем понедельник при загрузке
        renderDay('Понедельник');
    </script>
</body>
</html>
