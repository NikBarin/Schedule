<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>РАСПИСАШКА 📅</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1:#050b18;
      --bg2:#0b1426;
      --glass: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.12);
      --accent: #67c8ff;
      --accent-2: #d685ff;
      --text:#eef5ff;
      --muted:#9fb3d1;
      font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:radial-gradient(600px 400px at 10% 15%, rgba(103,200,255,0.1), transparent),
                 radial-gradient(600px 400px at 90% 85%, rgba(214,133,255,0.07), transparent),
                 linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      display:flex;
      flex-direction:column;
      min-height:100vh;
      padding:12px;
    }

    header{
      text-align:center;
      padding:12px 0 8px 0;
    }
    .title{font-size:22px;font-weight:700;}
    .subtitle{color:var(--muted);font-size:13px;}

    .day-selector{
      display:flex;
      overflow-x:auto;
      gap:8px;
      justify-content:flex-start;
      padding:10px 4px;
      margin-bottom:12px;
    }
    .day-selector button{
      flex-shrink:0;
      background:rgba(255,255,255,0.05);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px 14px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
      white-space:nowrap;
    }
    .day-selector button.active{
      background:linear-gradient(90deg, rgba(103,200,255,0.2), rgba(214,133,255,0.2));
      border-color:var(--accent);
    }

    .schedule{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .lesson-card{
      background:var(--glass);
      border:1px solid var(--border);
      backdrop-filter:blur(10px);
      border-radius:14px;
      padding:12px 16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.25);
      display:flex;
      flex-direction:column;
      gap:6px;
      transition:transform 0.15s ease;
    }
    .lesson-card:active{transform:scale(0.98);}
    .lesson-time{color:var(--muted);font-weight:600;font-size:13px;}
    .lesson-name{font-size:17px;font-weight:700;}
    .lesson-info{display:flex;flex-wrap:wrap;gap:8px;font-size:14px;color:var(--muted);}
    .lesson-hw{font-size:14px;margin-top:4px;color:var(--accent);}

    /* Картинки */
    .lesson-img {
      margin-top: 8px;
      border-radius: 10px;
      max-height: 120px;
      object-fit: cover;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    /* Модальное окно */
    #imgModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #imgModal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
    }

    #imgModalClose {
      position: absolute;
      top: 25px;
      right: 25px;
      font-size: 32px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    footer{text-align:center;color:var(--muted);font-size:12px;margin-top:auto;padding:12px 0;opacity:0.7;}
  </style>
</head>
  <link rel="icon" href="fawicon.ico">
<body>
  <header>
    <div class="title">РАСПИСАШКА</div>
    <div class="subtitle">Информация может быть неточной</div>
  </header>

  <div class="day-selector" id="daySelector">
    <button class="active" data-day="Понедельник">Пн</button>
    <button data-day="Вторник">Вт</button>
    <button data-day="Среда">Ср</button>
    <button data-day="Четверг">Чт</button>
    <button data-day="Пятница">Пт</button>
  </div>

  <div class="schedule" id="scheduleList"></div>

  <footer>Сделано с помощью ChatGPT</footer>

  <!-- Модалка для изображений -->
  <div id="imgModal">
    <div id="imgModalClose">✕</div>
    <img id="imgModalContent" src="">
  </div>

  <script>
    const times = [
      '12:40–13:20','13:40–14:20','14:40–15:20',
      '15:40–16:20','16:30–17:10','17:20–18:00','18:10–18:50'
    ];

    const data = {
  'Понедельник': [
    { lesson: 'Алгебра', room: '46', teacher: 'Екатерина Сергеевна', hw: '', img: '' },
    { lesson: 'Труд', room: '9', teacher: 'Елена Викторовна', hw: '', img: '' },
    { lesson: 'Труд', room: '9', teacher: 'Елена Викторовна', hw: '', img: '' },
    { lesson: 'Англ/Инф', room: '49a/39', teacher: 'Марина Владиславовна/Иван Анатольевич', hw: '', img: '' },
    { lesson: 'Русский', room: '33', teacher: 'Алёна Сергеевна', hw: '', img: '' },
    { lesson: 'Литература', room: '33', teacher: 'Алёна Сергеевна', hw: '', img: '' },
    { lesson: 'Физика', room: '46', teacher: 'Иван Анатольевич', hw: '', img: '' }
  ],
  'Вторник': [
    { lesson: 'нет', room: 'Большой зал', teacher: 'Сергей Александрович', hw: '', img: '' },
    { lesson: 'Геометрия', room: '47', teacher: 'Екатерина Сергеевна', hw: 'Принести циркуль', img: '' },
    { lesson: английский(весь класс)', room: '30', teacher: 'Оксана Евгеньевна', hw: '', img: '' },
    { lesson: 'География', room: '49', teacher: 'Виктория Владимировна', hw: 'Повторить тему по параграфу 43', img: '' },
    { lesson: 'История', room: '36', teacher: 'Павл Сергеевич', hw: '', img: '' },
    { lesson: 'Нет', room: '23', teacher: 'Дарья Андреевна', hw: '', img: '' }
  ],
  'Среда': [
    { lesson: 'Информатика/английский', room: '39/30', teacher: 'Юлия Сергеевна/Оксана Евгеньевна', hw: '', img: '' },
    { lesson: 'История', room: '42', teacher: 'Павел Сергеевич', hw: '', img: '' },
    { lesson: 'Физ-ра', room: 'Большой зал', teacher: 'Сергей Александрович', hw: '', img: '' },
    { lesson: 'Алгебра', room: '47', teacher: 'Екатерина Сергеевна', hw: 'Выполнить задание из файла', img: 'alg.jpg' },
    { lesson: 'Биология', room: '14', teacher: 'Елена Анатольевна', hw: 'п. 17 прочитать, определения(в тетради) учить, в. 1-5 стр 111 устно', img: '' }
    
    
  ],
  'Четверг': [
    { lesson: 'Кл. час', room: '29', teacher: 'Виктор Викторович', hw: '', img: '' },
    { lesson: 'Русский', room: '33', teacher: 'Алёна Сергеевна', hw: 'стр 37-38 правило, упр 437', img: '' },
    { lesson: 'Алгебра', room: '46', teacher: 'Екатерина Сергеевна', hw: 'нет дз', img: '' },
    { lesson: 'Геометрия', room: '47', teacher: 'Екатерина Сергеевна', hw: 'Повторить: признаки равенства треугольников с.30, 37, 38.; определения медианы, биссектрисы, высоты треугольника с. 33; свойства равнобедренного треугольника с. 34, свойства прямоугольного треугольника с. 75, соотношения между сторонами и углами треугольника с.71', img: '' },
    { lesson: 'Изо', room: '21', teacher: 'Вера Михайловна', hw: '', img: '' },
    { lesson: 'Вероятность и статистика', room: '46', teacher: 'Екатерина Сергеевна', hw: 'Задание из файла', img: 'verka.jpg' },
    { lesson: 'География', room: '49', teacher: 'Виктория Владимировна', hw: 'Повторите тему по параграфу 42', img: '' }
  ],
  'Пятница': [
    { lesson: 'Физика', room: '29', teacher: 'Иван Анатольевич', hw: '', img: '' },
    { lesson: 'Английский', room: '30/49а', teacher: 'Оксана Евгеньевна/Марина Владиславовна', hw: 'Выполнить задание из файла/', img: 'angl.jpg' },
    { lesson: 'Коми', room: '22', teacher: 'Марина Ивановна', hw: '', img: '' },
    { lesson: 'История', room: '42', teacher: 'Павел Сергеевич', hw: 'Параграф 40-41. Восстание степана разина (причины, ход, итоги письменно) ', img: '' },
    { lesson: 'Физкультура', room: 'Большой зал', teacher: 'Сергей Александрович', hw: '', img: '' }
    
    
  ]
};


    const list = document.getElementById('scheduleList');
    const dayButtons = document.querySelectorAll('#daySelector button');

    function renderDay(day){
      dayButtons.forEach(b=>b.classList.toggle('active', b.dataset.day===day));
      list.innerHTML = '';
      data[day].forEach((row, i)=>{
        const card = document.createElement('div');
        card.className = 'lesson-card';
        card.innerHTML = `
          <div class="lesson-time">${times[i]}</div>
          <div class="lesson-name">${row.lesson}</div>
          <div class="lesson-info">
            <span>Каб. ${row.room}</span>
            <span>${row.teacher}</span>
          </div>
          ${row.hw ? `<div class="lesson-hw">ДЗ: ${row.hw}</div>` : ''}
          ${row.img ? `<img src="${row.img}" class="lesson-img">` : ''}
        `;
        list.appendChild(card);
      });

      document.querySelectorAll('.lesson-img').forEach(img => {
        img.onclick = () => openModal(img.src);
      });
    }

    const modal = document.getElementById("imgModal");
    const modalImg = document.getElementById("imgModalContent");
    const modalClose = document.getElementById("imgModalClose");

    function openModal(src) {
      modalImg.src = src;
      modal.style.display = "flex";
    }

    modalClose.onclick = () => modal.style.display = "none";
    modal.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };

    dayButtons.forEach(btn=>btn.addEventListener('click',()=>renderDay(btn.dataset.day)));
    renderDay('Понедельник');
  </script>
</body>
</html>
